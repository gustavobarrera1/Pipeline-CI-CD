apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: maven-test-updater
  namespace: argocd
spec:
  writeBackConfig:
    method: "git"
    gitConfig:
      branch: "main"

  applicationRefs:
    - namePattern: "app-maven-test-cd"
      images:
        - alias: "mi-app"
          imageName: "docker.io/gustavobarrera/maven-test-cicd"
          
          manifestTargets:
            helm:
              name: "image.repository"
              tag: "image.tag"
          
          commonUpdateSettings:
            updateStrategy: "semver"
            allowTags: "regexp:^1\\.0\\.[0-9]+$"
            pullSecret: "pullsecret:argocd/dockerhub-creds"